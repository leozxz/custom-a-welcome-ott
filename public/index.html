<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Transacional</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Step 1: Create OTT Definition -->
  <div id="step1" class="step active">
    <h2>Criar Send Definition</h2>

    <div class="form-group">
      <label for="defKey">Definition Key</label>
      <input type="text" id="defKey" placeholder="ex: whatsapp_order_confirm" />
    </div>

    <div class="form-group">
      <label for="defName">Nome</label>
      <input type="text" id="defName" placeholder="ex: Confirmacao de Pedido" />
    </div>

    <div class="form-group">
      <label for="senderId">Sender ID (WhatsApp Business Number)</label>
      <input type="text" id="senderId" placeholder="ex: +5511999999999" />
    </div>

    <div class="form-group">
      <label for="customerKey">Content Customer Key (Template)</label>
      <input type="text" id="customerKey" placeholder="Customer key do template aprovado" />
    </div>

    <div class="form-group">
      <label for="defDescription">Descricao (opcional)</label>
      <textarea id="defDescription" placeholder="Descricao da definition"></textarea>
    </div>

    <button id="btnCreateDef" class="btn btn-primary">Criar Definition</button>
    <div id="createDefStatus"></div>
  </div>

  <!-- Step 2: Configure Send -->
  <div id="step2" class="step">
    <h2>Configurar Envio</h2>

    <div class="form-group">
      <label for="cfgDefinitionKey">Definition Key</label>
      <input type="text" id="cfgDefinitionKey" placeholder="Definition key criada no step anterior" />
      <p class="hint">Informe a definition key criada no passo anterior ou uma existente.</p>
    </div>

    <div class="form-group">
      <label for="cfgContactKey">Contact Key (campo da DE)</label>
      <select id="cfgContactKey">
        <option value="">-- Selecione um campo --</option>
      </select>
      <p class="hint">Campo da Data Extension de entrada que contem o Contact Key.</p>
    </div>

    <div class="form-group">
      <label for="cfgTo">Telefone destino (campo da DE)</label>
      <select id="cfgTo">
        <option value="">-- Selecione um campo --</option>
      </select>
      <p class="hint">Campo da Data Extension de entrada que contem o numero WhatsApp destino.</p>
    </div>
  </div>

  <script src="https://marketingcloudapis.com/postmonger/2/postmonger.js"></script>
  <script src="customActivity.js"></script>
</body>
</html>
